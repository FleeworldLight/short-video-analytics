name: CI - 小矩阵 + Pages 部署

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip-kpi:
        description: '跳过 ETL+KPI 全流程，仅部署 Pages（使用模拟数据）'
        type: boolean
        default: false

jobs:
  etl-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    concurrency:
      group: pages
      cancel-in-progress: false

    steps:
      - uses: actions/checkout@v4

      - name: 下载 KuaiRec 数据集
        if: ${{ github.event_name == 'push' || !inputs.skip-kpi }}
        run: |
          echo "正在从 Zenodo 下载 KuaiRec 2.0 ..."
          wget -q -O KuaiRec.zip \
            "https://zenodo.org/records/18164998/files/KuaiRec.zip?download=1"
          ls -lh KuaiRec.zip
          unzip -q KuaiRec.zip
          echo "KuaiRec 原始文件结构："
          find . -maxdepth 3 -name "*.csv" | sort
          mv "KuaiRec 2.0" kuairc
          echo "最终文件："
          ls -la kuairc/data/

      - name: 下载 PostgreSQL JDBC 驱动
        if: ${{ github.event_name == 'push' || !inputs.skip-kpi }}
        run: |
          curl -sL -o docker/postgresql-42.5.1.jar \
            "https://jdbc.postgresql.org/download/postgresql-42.5.1.jar"
          ls -lh docker/postgresql-42.5.1.jar

      - name: 创建挂载目录
        if: ${{ github.event_name == 'push' || !inputs.skip-kpi }}
        run: |
          mkdir -p "结果数据"

      - name: 启动 Docker 集群
        if: ${{ github.event_name == 'push' || !inputs.skip-kpi }}
        run: |
          docker compose -f docker/docker-compose.yml up -d \
            namenode datanode resourcemanager nodemanager \
            hive-db hive-metastore hive-server mysql
          echo "所有容器："
          docker ps -a --format "table {{.Names}}\t{{.Status}}"

      - name: 等待 HDFS 就绪并创建目录
        if: ${{ github.event_name == 'push' || !inputs.skip-kpi }}
        run: |
          echo "等待 HDFS 就绪 ..."
          for i in $(seq 1 30); do
            if docker exec namenode hdfs dfsadmin -report > /dev/null 2>&1; then
              echo "HDFS 就绪，尝试次数：${i}"
              break
            fi
            echo "第 $i/30 次尝试，等待 10s ..."
            if [ "$i" -eq 30 ]; then
              echo "HDFS 启动失败（超过 30 次尝试）"
              docker logs namenode --tail 20 2>&1
              exit 1
            fi
            sleep 10
          done
          docker exec namenode hdfs dfs -mkdir -p \
            /user/hive/warehouse \
            /data/short_video/raw/ods_interaction \
            /data/short_video/raw/ods_item_category \
            /data/short_video/raw/ods_user_feature \
            /data/short_video/raw/ods_item_daily \
            /data/short_video/raw/ods_social_network \
            /data/short_video/dwd \
            /data/short_video/dws \
            /data/short_video/ads
          echo "HDFS 目录："
          docker exec namenode hdfs dfs -ls -R /

      - name: 上传 KuaiRec 数据到 HDFS
        if: ${{ github.event_name == 'push' || !inputs.skip-kpi }}
        run: |
          echo "上传 small_matrix.csv ..."
          docker cp kuairc/data/small_matrix.csv namenode:/tmp/
          docker exec namenode hdfs dfs -put -f /tmp/small_matrix.csv \
            /data/short_video/raw/ods_interaction/

          echo "上传 item_categories.csv ..."
          docker cp kuairc/data/item_categories.csv namenode:/tmp/
          docker exec namenode hdfs dfs -put -f /tmp/item_categories.csv \
            /data/short_video/raw/ods_item_category/

          echo "上传 user_features.csv ..."
          docker cp kuairc/data/user_features.csv namenode:/tmp/
          docker exec namenode hdfs dfs -put -f /tmp/user_features.csv \
            /data/short_video/raw/ods_user_feature/

          echo "上传 item_daily_features.csv ..."
          docker cp kuairc/data/item_daily_features.csv namenode:/tmp/
          docker exec namenode hdfs dfs -put -f /tmp/item_daily_features.csv \
            /data/short_video/raw/ods_item_daily/

          echo "上传其他文件 ..."
          docker cp kuairc/data/social_network.csv namenode:/tmp/
          docker exec namenode hdfs dfs -put -f /tmp/social_network.csv \
            /data/short_video/raw/ods_social_network/

          echo "HDFS 上传完成："
          docker exec namenode hdfs dfs -ls -R /data/short_video/raw/

      - name: 等待 HiveServer2 就绪
        if: ${{ github.event_name == 'push' || !inputs.skip-kpi }}
        run: |
          echo "等待 HiveServer2 就绪 ..."
          MAX=36
          for i in $(seq 1 $MAX); do
            if docker exec hive-server \
              beeline -u jdbc:hive2://localhost:10000 -n hive \
              -e "SHOW DATABASES;" > /dev/null 2>&1; then
              echo "HiveServer2 就绪，尝试次数：${i}"
              break
            fi
            if [ "$i" -eq "$MAX" ]; then
              echo "HiveServer2 启动失败（超过 ${MAX} 次尝试）"
              echo ""
              echo "=== hive-server 日志（末尾 30 行）==="
              docker logs hive-server --tail 30 2>&1
              echo ""
              echo "=== hive-metastore 日志（末尾 20 行）==="
              docker logs hive-metastore --tail 20 2>&1
              echo ""
              echo "=== 所有容器状态 ==="
              docker ps -a --format "table {{.Names}}\t{{.Status}}"
              exit 1
            fi
            echo "第 $i/$MAX 次尝试，等待 10s ..."
            docker logs hive-server --tail 3 2>&1 || true
            sleep 10
          done

      - name: 创建 Hive 表
        if: ${{ github.event_name == 'push' || !inputs.skip-kpi }}
        run: |
          echo "创建 ODS/DWD/DWS/ADS 表 ..."
          docker exec hive-server beeline -u jdbc:hive2://localhost:10000 -n hive -f /scripts/2_create_tables.hql 2>&1
          echo "表创建完成"

      - name: 数据清洗（ODS → DWD）
        if: ${{ github.event_name == 'push' || !inputs.skip-kpi }}
        run: |
          echo "执行 ETL：ODS → DWD ..."
          docker exec hive-server beeline -u jdbc:hive2://localhost:10000 -n hive -f /scripts/1_clean_data.hql 2>&1
          echo "DWD 加载完成"

      - name: 构建维度表
        if: ${{ github.event_name == 'push' || !inputs.skip-kpi }}
        run: |
          echo "构建 dim_category 和 dim_creator ..."
          docker exec hive-server beeline -u jdbc:hive2://localhost:10000 -n hive -e "
            INSERT OVERWRITE TABLE dim_category VALUES
              (1, 'Gaming', '娱乐'), (2, 'Music', '艺术'), (5, 'Fashion', '生活'),
              (6, 'Entertainment', '娱乐'), (7, 'Sports', '生活'), (9, 'Comedy', '娱乐'),
              (11, 'Life', '生活'), (12, 'Food', '生活'), (13, 'Agriculture', '生活'),
              (17, 'Animals', '生活'), (18, 'Cars', '生活'), (20, 'Film', '艺术'),
              (26, 'Photography', '文化'), (27, 'Other', '其他'), (28, 'News', '文化'),
              (31, 'Knowledge', '文化');
            INSERT OVERWRITE TABLE dim_creator
            SELECT author_id AS creator_id,
                   COUNT(DISTINCT video_id) AS total_videos,
                   COUNT(DISTINCT video_tag_id) AS distinct_categories,
                   ROUND(AVG(video_duration), 2) AS avg_video_duration
            FROM ods_raw_item_daily_features
            WHERE author_id IS NOT NULL
            GROUP BY author_id;
          " 2>&1
          echo "维度表构建完成"

      - name: 执行 KPI 指标计算
        if: ${{ github.event_name == 'push' || !inputs.skip-kpi }}
        run: |
          echo "KPI 1：完播率计算 ..."
          docker exec hive-server beeline -u jdbc:hive2://localhost:10000 -n hive -f /scripts/3_kpi_completion_rate.hql 2>&1
          echo "KPI 2：用户留存率计算 ..."
          docker exec hive-server beeline -u jdbc:hive2://localhost:10000 -n hive -f /scripts/4_kpi_retention.hql 2>&1
          echo "KPI 3：内容热度排行计算 ..."
          docker exec hive-server beeline -u jdbc:hive2://localhost:10000 -n hive -f /scripts/5_kpi_hot_ranking.hql 2>&1
          echo "KPI 4：创作者影响力计算 ..."
          docker exec hive-server beeline -u jdbc:hive2://localhost:10000 -n hive -f /scripts/6_kpi_influencer.hql 2>&1
          echo "附加分析：时段播放分析 ..."
          docker exec hive-server beeline -u jdbc:hive2://localhost:10000 -n hive -e "
            INSERT OVERWRITE TABLE ads_time_period_analysis
            SELECT time_period, COUNT(*) AS play_count,
                   ROUND(AVG(watch_ratio), 4) AS avg_watch_ratio,
                   SUM(like_flag) AS like_count
            FROM dwd_interaction_detail
            GROUP BY time_period
            ORDER BY play_count DESC;
          " 2>&1
          echo "KPI 计算完成"

      - name: 验证 ADS 表数据
        if: ${{ github.event_name == 'push' || !inputs.skip-kpi }}
        run: |
          echo "ADS 表行数统计："
          docker exec hive-server beeline -u jdbc:hive2://localhost:10000 -n hive -e "
            SELECT 'completion_rate_by_category', COUNT(*) FROM ads_completion_rate_by_category
            UNION ALL SELECT 'completion_rate_by_author', COUNT(*) FROM ads_completion_rate_by_author
            UNION ALL SELECT 'user_retention', COUNT(*) FROM ads_user_retention
            UNION ALL SELECT 'content_hot_ranking', COUNT(*) FROM ads_content_hot_ranking
            UNION ALL SELECT 'influencer_index', COUNT(*) FROM ads_influencer_index
            UNION ALL SELECT 'time_period_analysis', COUNT(*) FROM ads_time_period_analysis;
          " 2>&1

      - name: 导出 ADS 指标为 CSV
        if: ${{ github.event_name == 'push' || !inputs.skip-kpi }}
        run: |
          echo "导出 ADS 到 CSV ..."
          for pair in "completion_rate_by_category:completion_rate_by_category" \
            "completion_rate_by_author:completion_rate_by_author" \
            "user_retention:retention" \
            "content_hot_ranking:hot_ranking" \
            "influencer_index:influencer" \
            "time_period_analysis:time_period_analysis"; do
            tbl="${pair%%:*}"
            csv="${pair#*:}"
            echo "  导出 ads_$tbl → 结果数据/$csv.csv"
            docker exec hive-server beeline -u jdbc:hive2://localhost:10000 -n hive --outputformat=csv2 -e "SELECT * FROM ads_$tbl" \
              > "结果数据/$csv.csv"
          done
          echo "导出完成"
          ls -lh "结果数据/"

      - name: 导出 DWD 清洗样例（前100行）
        if: ${{ github.event_name == 'push' || !inputs.skip-kpi }}
        run: |
          echo "导出 DWD 清洗样例（前100行）..."
          docker exec hive-server beeline -u jdbc:hive2://localhost:10000 -n hive \
            --outputformat=csv2 -e "SELECT * FROM dwd_interaction_detail LIMIT 100" \
            > "结果数据/dwd_sample.csv"
          echo "已导出：结果数据/dwd_sample.csv"

      - name: 转换 CSV 为 JSON（供 Pages 使用）
        if: ${{ github.event_name == 'push' || !inputs.skip-kpi }}
        run: python 脚本/csv_to_json.py

      - name: 上传结果文件
        if: ${{ github.event_name == 'push' || !inputs.skip-kpi }}
        uses: actions/upload-artifact@v4
        with:
          name: results
          path: |
            结果数据/*.csv
            docs/data.json

      - name: 配置 Pages
        uses: actions/configure-pages@v5

      - name: 上传 docs/ 目录到 Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/

      - name: 部署到 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: 清理资源
        if: ${{ always() && !inputs.skip-kpi }}
        run: docker compose -f docker/docker-compose.yml down -v
