name: CI - Docker Smoke Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - name: Download KuaiRec data from Zenodo
        run: |
          echo "Downloading KuaiRec.zip (~1.5GB)..."
          wget -q --show-progress \
            "https://zenodo.org/records/18164998/files/KuaiRec.zip?download=1" \
            -O /tmp/KuaiRec.zip
          echo "Extracting..."
          unzip -q /tmp/KuaiRec.zip -d /tmp/kuaircextract
          mkdir -p 数据样例
          cp /tmp/kuaircextract/"KuaiRec 2.0"/data/*.csv 数据样例/
          rm -f /tmp/KuaiRec.zip
          echo "Data files:"
          ls -lh 数据样例/

      - name: Start Docker cluster (essential services only)
        run: |
          docker compose -f docker/docker-compose.yml up -d \
            namenode datanode hive-db hive-metastore hive-server mysql spark-master
          echo "Waiting for containers to start..."
          docker compose -f docker/docker-compose.yml ps

      - name: Wait for services to be ready
        run: sleep 120

      - name: Diagnose - show running containers
        run: |
          docker ps -a --format "table {{.Names}}\t{{.Status}}"
          for c in namenode datanode hive-metastore hive-server; do
            echo "--- $c logs (tail 20) ---"
            docker logs "$c" 2>&1 | tail -20 || true
          done

      - name: Check HDFS - namenode report
        run: docker exec namenode hdfs dfsadmin -report

      - name: Check HDFS - basic operations
        run: |
          docker exec namenode hdfs dfs -mkdir -p /data/short_video/raw/ods_interaction
          docker exec namenode hdfs dfs -mkdir -p /data/short_video/raw/ods_item_category
          docker exec namenode hdfs dfs -mkdir -p /data/short_video/raw/ods_user_feature
          docker exec namenode hdfs dfs -ls /data/short_video/raw/
          echo "HDFS OK"

      - name: Upload data to HDFS
        run: |
          docker exec namenode hdfs dfs -put -f /data/samples/big_matrix_sample.csv \
            /data/short_video/raw/ods_interaction/
          docker exec namenode hdfs dfs -put -f /data/samples/item_categories_sample.csv \
            /data/short_video/raw/ods_item_category/
          docker exec namenode hdfs dfs -put -f /data/samples/user_features_raw_sample.csv \
            /data/short_video/raw/ods_user_feature/
          docker exec namenode hdfs dfs -ls -R /data/short_video/raw/
          echo "Upload OK"

      - name: Check Hive
        run: |
          docker exec hive-server hive -e "SHOW DATABASES;"
          echo "Hive OK"

      - name: Check Spark master UI
        run: |
          curl -sf http://localhost:8080 > /dev/null && echo "Spark Master OK"

      - name: Run basic Hive query
        run: |
          docker exec hive-server hive -e "
            CREATE TABLE IF NOT EXISTS test_ci (id INT, name STRING)
            ROW FORMAT DELIMITED FIELDS TERMINATED BY ',';
            SHOW TABLES;
            DROP TABLE test_ci;
          "
          echo "Hive query OK"

      - name: Cleanup
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v
