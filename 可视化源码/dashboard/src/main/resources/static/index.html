<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>短视频平台内容分析系统</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: #f0f2f5; padding: 20px; }
        .header { text-align: center; padding: 20px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; border-radius: 12px; margin-bottom: 20px; }
        .header h1 { font-size: 28px; margin-bottom: 8px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(500px, 1fr)); gap: 20px; }
        .card { background: #fff; border-radius: 12px; padding: 20px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); }
        .card h2 { font-size: 18px; color: #333; margin-bottom: 16px; padding-left: 12px; border-left: 4px solid #667eea; }
        .chart { width: 100%; height: 400px; }
        @media (max-width: 1100px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
<div class="header">
    <h1>短视频平台内容分析系统</h1>
    <p>基于 KuaiRec 数据集 · 数仓 ODS/DWD/DWS/ADS 四层架构</p>
</div>
<div class="grid">
    <div class="card"><h2>完播率分布（按类别）</h2><div id="chart1" class="chart"></div></div>
    <div class="card"><h2>用户留存率曲线</h2><div id="chart2" class="chart"></div></div>
    <div class="card"><h2>内容热度排行 Top 30</h2><div id="chart3" class="chart"></div></div>
    <div class="card"><h2>创作者影响力指数排行</h2><div id="chart4" class="chart"></div></div>
    <div class="card"><h2>时段播放分析</h2><div id="chart5" class="chart"></div></div>
    <div class="card"><h2>创作者完播率排行 Top 20</h2><div id="chart6" class="chart"></div></div>
</div>
<script>
const API = axios.create({ baseURL: '/api' });

// Chart 1: 完播率按类别
API.get('/completion/category').then(r => {
    const data = r.data;
    const chart = echarts.init(document.getElementById('chart1'));
    chart.setOption({
        tooltip: { trigger: 'axis' },
        xAxis: { type: 'category', data: data.map(d => d.tagName), axisLabel: { rotate: 45 } },
        yAxis: { type: 'value', name: '完播率', axisLabel: { formatter: '{value}%' } },
        series: [{
            type: 'bar', data: data.map(d => (d.completionRate * 100).toFixed(1)),
            itemStyle: { color: new echarts.graphic.LinearGradient(0,0,0,1, [{offset:0,color:'#667eea'},{offset:1,color:'#764ba2'}]) }
        }]
    });
});

// Chart 2: 留存率
API.get('/retention').then(r => {
    const data = r.data;
    const chart = echarts.init(document.getElementById('chart2'));
    chart.setOption({
        tooltip: { trigger: 'axis' },
        legend: { data: ['次日留存', '7日留存', '30日留存'] },
        xAxis: { type: 'category', data: data.map(d => d.reportDate) },
        yAxis: { type: 'value', name: '留存率', axisLabel: { formatter: '{value}%' } },
        series: [
            { name: '次日留存', type: 'line', data: data.map(d => (d.day1Retention * 100).toFixed(1)), smooth: true, lineStyle: { color: '#667eea' } },
            { name: '7日留存', type: 'line', data: data.map(d => (d.day7Retention * 100).toFixed(1)), smooth: true, lineStyle: { color: '#f09b22' } },
            { name: '30日留存', type: 'line', data: data.map(d => (d.day30Retention * 100).toFixed(1)), smooth: true, lineStyle: { color: '#52c41a' } }
        ]
    });
});

// Chart 3: 热度排行
API.get('/hot-ranking').then(r => {
    const data = r.data.slice(0, 30);
    const chart = echarts.init(document.getElementById('chart3'));
    chart.setOption({
        tooltip: { trigger: 'axis' },
        xAxis: { type: 'value', name: '热度分' },
        yAxis: { type: 'category', data: data.map(d => '#' + d.videoId).reverse() },
        series: [{
            type: 'bar', data: data.map(d => d.hotScore).reverse(),
            itemStyle: { color: new echarts.graphic.LinearGradient(0,0,1,0, [{offset:0,color:'#f09b22'},{offset:1,color:'#f56565'}]) }
        }]
    });
});

// Chart 4: 创作者影响力
API.get('/influencer').then(r => {
    const data = r.data;
    const chart = echarts.init(document.getElementById('chart4'));
    chart.setOption({
        tooltip: { trigger: 'axis' },
        xAxis: { type: 'value', name: '影响力分' },
        yAxis: { type: 'category', data: data.map(d => '创作者' + d.uploaderId).reverse() },
        series: [{
            type: 'bar', data: data.map(d => d.influenceScore).reverse(),
            itemStyle: { color: new echarts.graphic.LinearGradient(0,0,1,0, [{offset:0,color:'#48bb78'},{offset:1,color:'#38b2ac'}]) }
        }]
    });
});

// Chart 5: 时段分析
API.get('/time-period').then(r => {
    const data = r.data;
    const chart = echarts.init(document.getElementById('chart5'));
    chart.setOption({
        tooltip: { trigger: 'axis' },
        xAxis: { type: 'category', data: data.map(d => d.timePeriod) },
        yAxis: { type: 'value', name: '播放量' },
        series: [{
            type: 'bar', data: data.map(d => d.playCount),
            itemStyle: {
                color: function(p) {
                    const colors = ['#667eea','#f09b22','#48bb78','#f56565','#9f7aea'];
                    return colors[p.dataIndex % colors.length];
                }
            }
        }]
    });
});

// Chart 6: 创作者完播率
API.get('/completion/author').then(r => {
    const data = r.data.slice(0, 20);
    const chart = echarts.init(document.getElementById('chart6'));
    chart.setOption({
        tooltip: { trigger: 'axis' },
        xAxis: { type: 'value', name: '完播率', axisLabel: { formatter: '{value}%' } },
        yAxis: { type: 'category', data: data.map(d => '创作者' + d.uploaderId).reverse() },
        series: [{
            type: 'bar', data: data.map(d => (d.avgCompletionRate * 100).toFixed(1)).reverse(),
            itemStyle: { color: new echarts.graphic.LinearGradient(0,0,1,0, [{offset:0,color:'#9f7aea'},{offset:1,color:'#667eea'}]) }
        }]
    });
});
</script>
</body>
</html>
